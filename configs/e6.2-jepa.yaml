# E6.2 + E6.3 combined: joint FSQ+Transformer + JEPA EMA target + learnable γ
#
# Three structural changes on top of V5 at once (single-knob discipline
# relaxed here because the pre-freeze time budget doesn't support three
# sequential unfreeze -> swap -> learnable runs):
#   1. Unfreeze FSQ, fresh init, train jointly with transformer via STE.
#   2. JEPA: EMA target FSQ encoder provides prediction targets; AC-CPC
#      removed from the transformer (use_cpc=false).
#   3. Learnable per-dim SLS precision γ ∈ R^4. Init from mean-normalised
#      capacity ratio: γ_d = ln(L_d / mean(L)). Closed-form from `levels`,
#      data-independent, scale-preserving (γ = 0 on uniform codebooks =
#      V5 isotropic kernel scale). Target distribution rebuilt per
#      forward pass; γ receives gradient via CE.
#
# Decoder survives as a detached viewer: MSE(decoder(z_q.detach()),
# frame) with small weight alpha_view keeps it visualization-ready while
# encoder is shaped purely by JEPA + slow + unif.
#
# Fallback: if this fails on A100, `git checkout version/6-joint-training`
# and launch configs/e6.1-joint.yaml. One slot late on the roadmap.

# Shared model architecture (identical to V5 / E6.1)
model:
  vocab_size: 625
  embed_dim: 512
  n_heads: 8
  n_layers: 8
  tokens_per_frame: 64
  context_frames: 4
  levels: [5, 5, 5, 5]
  dropout: 0.15
  adaln: true

# Transformer + joint training
transformer:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 512
  lr: 0.004             # transformer peak (V5)
  lr_min: 0.0002        # E6.1 tighter-tail floor (shared schedule)
  weight_decay: 0.01
  cpc_weight: 1.0       # inert when use_cpc=false (kept for compat)
  token_noise: 0.05
  fsq_noise: 0.05
  label_smoothing: 0.1
  fsq_sigma: 0.9
  focal_gamma: 2.0
  death_oversample: 4
  steps_per_epoch: 500
  patience: 60
  seed: 42
  checkpoint_dir: checkpoints_e6.2
  # Joint
  joint: true
  fsq_lr: 0.001
  alpha_slow: 0.1
  alpha_uniform: 0.01
  shift_max: 4          # on-the-fly vertical shift augmentation
  # E6.2+E6.3 structural flags
  use_cpc: false        # AC-CPC removed; transformer CE against EMA teacher
  ema_tau: 0.996        # EMA target decay (~250-step half-life)
  alpha_view: 0.1       # detached decoder viewer loss weight
  encoder_recon: false  # no encoder-side recon; viewer only
  learnable_gamma: true # γ is nn.Parameter, rebuilt target per batch

controller_bc:
  expert_episodes_dir: data/expert_episodes
  transformer_checkpoint: checkpoints_e6.2/transformer_best.pt
  epochs: 50
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  val_ratio: 0.1
  seed: 42
  checkpoint_dir: checkpoints_e6.2

controller_ppo:
  transformer_checkpoint: checkpoints_e6.2/transformer_best.pt
  pretrained: checkpoints_e6.2/controller_bc_best.pt
  amp_dtype: bfloat16
  n_iterations: 50000
  n_episodes: 512
  lr: 0.0001
  gamma: 0.995
  lam: 0.95
  clip_eps: 0.2
  ppo_epochs: 4
  minibatch_size: 512
  entropy_coeff: 0.01
  critic_coeff: 0.5
  max_grad_norm: 0.5
  max_dream_steps: 45
  death_threshold: 0.5
  mlp_hidden: 512
  n_eval_episodes: 512
  eval_interval: 10
  seed: 42
  checkpoint_dir: checkpoints_e6.2
