# E6.14 -- E6.10 + restore horizontal shift augmentation + jump_penalty=0.15.
#
# Restores per-batch horizontal shift augmentation that was silently dropped
# in 2026-03-24 (a480ef3) when the on-the-fly augment_batch was refactored
# into shift_episodes.py with dx hardcoded to 0. The pre-fix V1/V2 FSQ saw
# random per-sample x+y shifts in [-4, +4]; the resulting "smoothed" codebook
# is what the V3-best 512d transformer (val_acc 35%, deploy 20% level 1) was
# trained on. Every checkpoint since lost that scroll-phase invariance.
#
# With stride-8 tokens (64x64 frames -> 8x8 token grid), shifts of [-4, +4]
# in both axes cover all 64 sub-patch phases (8x8 period). The encoder
# becomes invariant to where in a patch the world has scrolled to, which
# matters because Geometry Dash scrolls horizontally and the deploy-time
# scroll phase doesn't pixel-align to training.
#
# Also carries forward jump_penalty 0.25 -> 0.15 from the failed E6.12/E6.13
# detours. Everything else identical to E6.10.

model:
  vocab_size: 625
  embed_dim: 512
  n_heads: 8
  n_layers: 8
  tokens_per_frame: 64
  context_frames: 4
  levels: [5, 5, 5, 5]
  dropout: 0.10
  adaln: true

transformer:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 1024
  lr: 0.001
  lr_min: 0.00005
  weight_decay: 0.001
  cpc_weight: 1.0
  token_noise: 0.0
  fsq_noise: 0.05
  label_smoothing: 0.1
  fsq_kernel: gaussian
  fsq_sigma: 0.7
  fsq_dim_weights: [1.0, 1.0, 1.0, 1.0]
  focal_gamma: 2.0
  death_oversample: 4
  seed: 42
  checkpoint_dir: checkpoints_e6.14
  joint: true
  single_group: true
  grad_clip: 10.0
  alpha_uniform: 0.0
  shift_max: 4
  shift_max_x: 4
  use_cpc: false
  use_recon: true
  learnable_gamma: false

posthoc_decoder:
  transformer_checkpoint: checkpoints_e6.14/transformer_best.pt
  fsq_checkpoint: checkpoints_e6.14/fsq_best.pt
  epochs: 30
  batch_size: 512
  lr: 0.001
  seed: 42
  checkpoint_dir: checkpoints_e6.14

controller_bc:
  expert_episodes_dir: data/expert_episodes
  transformer_checkpoint: checkpoints_e6.14/transformer_best.pt
  epochs: 50
  batch_size: 512
  lr: 0.0005
  weight_decay: 0.0001
  jump_class_weight: 1.5
  controller_dropout: 0.0
  val_ratio: 0.1
  token_embed_dim: 16
  temporal_dim: 32
  seed: 42
  checkpoint_dir: checkpoints_e6.14

controller_ppo:
  transformer_checkpoint: checkpoints_e6.14/transformer_best.pt
  pretrained: checkpoints_e6.14/controller_bc_best.pt
  amp_dtype: bfloat16
  n_iterations: 5000
  n_episodes: 4096
  lr: 0.0001
  gamma: 0.995
  lam: 0.95
  clip_eps: 0.2
  ppo_epochs: 4
  minibatch_size: 2048
  lr_warmup_iters: 50
  entropy_coeff: 0.001
  jump_penalty: 0.15
  critic_coeff: 0.5
  max_grad_norm: 0.5
  max_dream_steps: 25
  death_threshold: 0.5
  token_embed_dim: 16
  temporal_dim: 32
  controller_dropout: 0.0
  n_eval_episodes: 512
  eval_interval: 10
  seed: 42
  checkpoint_dir: checkpoints_e6.14
