# DeepDash V5 baseline (current headline, 2026-04-18).
# FSQ [5,5,5,5] + Transformer with calibrated dim_weights
# [1.02, 0.94, 0.83, 1.20] measured by scripts/fsq_sensitivity.py on 5000
# val frames of checkpoints_v5_fsq/fsq_best.pt (~50 perturbations, 500
# bootstrap samples, 3 seeds).
#
# Promoted from the former isotropic-dim-weights baseline (now
# v5-isotropic.yaml) on the basis of: slightly better loss/acc/recall
# (train and val), smoother training with no NaN-spike recoveries, dream
# rollouts at parity or marginally better, earlier convergence
# (epoch 168 vs 194).
#
# Shared FSQ lives in checkpoints_v5_fsq/ (unchanged). Transformer +
# controller weights for this baseline live in checkpoints_v5_dimweights/.
# Kernel gaussian, sigma 0.9, epsilon 0.1 (unchanged from V5 conventions).

# Shared model architecture
model:
  vocab_size: 625
  embed_dim: 512
  n_heads: 8
  n_layers: 8
  tokens_per_frame: 64
  context_frames: 4
  levels: [5, 5, 5, 5]
  dropout: 0.15
  adaln: true

# FSQ-VAE training (unchanged; re-uses shared v5 FSQ)
fsq:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 2048
  lr: 0.001
  alpha_slow: 0.1
  alpha_uniform: 0.01
  k_shifts: 1
  seed: 42
  amp: true
  compile: true
  checkpoint_dir: checkpoints_v5_fsq

# Transformer world-model training
transformer:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 512
  lr: 0.004
  lr_min: 0.0005
  weight_decay: 0.01
  cpc_weight: 1.0
  token_noise: 0.05
  fsq_noise: 0.05
  label_smoothing: 0.1
  fsq_sigma: 0.9
  fsq_dim_weights: [1.02, 0.94, 0.83, 1.20]
  focal_gamma: 2.0
  death_oversample: 4
  steps_per_epoch: 500
  patience: 60
  seed: 42
  checkpoint_dir: checkpoints_v5_dimweights

# Controller -- behavioral cloning pretraining
controller_bc:
  expert_episodes_dir: data/expert_episodes
  transformer_checkpoint: checkpoints_v5_dimweights/transformer_best.pt
  epochs: 50
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  val_ratio: 0.1
  seed: 42
  checkpoint_dir: checkpoints_v5_dimweights

# Controller -- PPO fine-tuning
controller_ppo:
  transformer_checkpoint: checkpoints_v5_dimweights/transformer_best.pt
  pretrained: checkpoints_v5_dimweights/controller_bc_best.pt
  amp_dtype: bfloat16
  n_iterations: 50000
  n_episodes: 512
  lr: 0.0001
  gamma: 0.995
  lam: 0.95
  clip_eps: 0.2
  ppo_epochs: 4
  minibatch_size: 512
  entropy_coeff: 0.01
  critic_coeff: 0.5
  max_grad_norm: 0.5
  max_dream_steps: 45
  death_threshold: 0.5
  mlp_hidden: 512
  n_eval_episodes: 512
  eval_interval: 10
  seed: 42
  checkpoint_dir: checkpoints_v5_dimweights
