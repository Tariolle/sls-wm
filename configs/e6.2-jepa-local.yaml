# E6.2 + E6.3 local probe on RTX 2060 SUPER (Turing, 8 GB VRAM, Windows).
#
# Inherits E6.2 structural changes from e6.2-jepa.yaml with Turing
# hardware overrides (fp16, compile_mode=default, smaller batch).
# Correctness + trajectory probe only; real training happens on A100.

# Shared model architecture (identical to E6.2)
model:
  vocab_size: 625
  embed_dim: 512
  n_heads: 8
  n_layers: 8
  tokens_per_frame: 64
  context_frames: 4
  levels: [5, 5, 5, 5]
  dropout: 0.15
  adaln: true

# Transformer + joint training
transformer:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 48         # 2060 SUPER ceiling with reduce-overhead compile
  lr: 0.004
  lr_min: 0.0002
  weight_decay: 0.01
  cpc_weight: 1.0
  token_noise: 0.05
  fsq_noise: 0.05
  label_smoothing: 0.1
  fsq_sigma: 0.9
  focal_gamma: 2.0
  death_oversample: 4
  steps_per_epoch: 500
  patience: 60
  seed: 42
  checkpoint_dir: checkpoints_e6.2_local
  # Joint
  joint: true
  fsq_lr: 0.001
  alpha_slow: 0.1
  alpha_uniform: 0.01
  shift_max: 4
  # E6.2+E6.3 structural flags
  use_cpc: false
  ema_tau: 0.996
  alpha_view: 0.1
  encoder_recon: false
  learnable_gamma: true
  # Turing hardware overrides
  amp_dtype: float16    # Turing has no native bf16 (emulated 12x slower)
  compile_mode: reduce-overhead  # Needs ~500 MB headroom beyond batch 48 VRAM

controller_bc:
  expert_episodes_dir: data/expert_episodes
  transformer_checkpoint: checkpoints_e6.2_local/transformer_best.pt
  epochs: 50
  batch_size: 256
  lr: 0.001
  weight_decay: 0.0001
  val_ratio: 0.1
  seed: 42
  checkpoint_dir: checkpoints_e6.2_local

controller_ppo:
  transformer_checkpoint: checkpoints_e6.2_local/transformer_best.pt
  pretrained: checkpoints_e6.2_local/controller_bc_best.pt
  amp_dtype: float16
  n_iterations: 50000
  n_episodes: 128
  lr: 0.0001
  gamma: 0.995
  lam: 0.95
  clip_eps: 0.2
  ppo_epochs: 4
  minibatch_size: 256
  entropy_coeff: 0.01
  critic_coeff: 0.5
  max_grad_norm: 0.5
  max_dream_steps: 45
  death_threshold: 0.5
  mlp_hidden: 512
  n_eval_episodes: 128
  eval_interval: 10
  seed: 42
  checkpoint_dir: checkpoints_e6.2_local
