# DeepDash V3 -- local training overrides (RTX 2060 SUPER, 8GB VRAM)
# Usage: python scripts/train_controller_ppo.py --config configs/v3-local.yaml
#
# Inherits model architecture from v4.yaml.
# Only overrides batch sizes and episode counts to fit 8GB VRAM.

# Shared model architecture (same as v4.yaml)
model:
  vocab_size: 1000
  embed_dim: 512
  n_heads: 8
  n_layers: 8
  tokens_per_frame: 64
  context_frames: 4
  levels: [8, 5, 5, 5]
  dropout: 0.15
  adaln: true

# FSQ-VAE training
fsq:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 256
  lr: 0.001
  alpha_slow: 0.1
  alpha_uniform: 0.01
  seed: 42
  amp: true
  compile: true
  checkpoint_dir: checkpoints

# Tokenization
tokenize:
  checkpoint: checkpoints/fsq_best.pt
  batch_size: 256
  shifts_v: [-4, -2, 0, 2, 4]

# Transformer world-model training
transformer:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 64
  lr: 0.004
  lr_min: 0.0005
  weight_decay: 0.01
  cpc_weight: 1.0
  token_noise: 0.05
  fsq_noise: 0.05
  label_smoothing: 0.1
  fsq_sigma: 0.9
  fsq_dim_weights: [1.29, 0.85, 0.97, 0.89]
  focal_gamma: 2.0
  death_oversample: 4
  steps_per_epoch: 500
  seed: 42
  checkpoint_dir: checkpoints

# Controller -- behavioral cloning pretraining
controller_bc:
  expert_episodes_dir: data/expert_episodes
  transformer_checkpoint: checkpoints/transformer_best.pt
  epochs: 50
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0001
  val_ratio: 0.1
  seed: 42
  checkpoint_dir: checkpoints

# Controller -- PPO fine-tuning
controller_ppo:
  transformer_checkpoint: checkpoints/transformer_best.pt
  pretrained: checkpoints/controller_bc_best.pt
  amp_dtype: float16
  n_iterations: 25000
  n_episodes: 128
  lr: 0.0001
  gamma: 0.995
  lam: 0.95
  clip_eps: 0.2
  ppo_epochs: 4
  minibatch_size: 128
  entropy_coeff: 0.01
  critic_coeff: 0.5
  max_grad_norm: 0.5
  max_dream_steps: 45
  death_threshold: 0.5
  mlp_hidden: 512
  n_eval_episodes: 128
  eval_interval: 10
  seed: 42
  checkpoint_dir: checkpoints
