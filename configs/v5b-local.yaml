# V5 baseline (FSQ [5,5,5,5]) full local training on RTX 2060 SUPER (8 GB).
# Inherits architecture from v5b.yaml. Overrides target local HW + applies the
# new augmentation stack (K=1 random shift per epoch, pixel noise, brightness/contrast).

# Shared model architecture (same as v5b.yaml)
model:
  vocab_size: 625
  embed_dim: 512
  n_heads: 8
  n_layers: 8
  tokens_per_frame: 64
  context_frames: 4
  levels: [5, 5, 5, 5]
  dropout: 0.15
  adaln: true

# FSQ-VAE training
fsq:
  episodes_dir: C:/Users/Florent/sls-wm-data/death_episodes
  expert_episodes_dir: C:/Users/Florent/sls-wm-data/expert_episodes
  epochs: 200
  batch_size: 1024
  lr: 0.001
  alpha_slow: 0.1
  alpha_uniform: 0.01
  k_shifts: 1               # 1 random shift variant per base ep per epoch (standard aug pattern)
  # pixel_noise removed: game renders are deterministic, no sensor noise in the input
  # distribution. Training to denoise wastes capacity and creates a train/val gap
  # (decoder over-corrects clean val frames).
  brightness_range: 0.1     # uniform ±0.1 offset, pair-coherent (plausible: skin/bg variation)
  contrast_range: 0.1       # uniform 1±0.1 factor, pair-coherent
  seed: 42
  # Benchmarked on RTX 2060 SUPER: compile(default)+fp16+GradScaler = 2.08x vs eager fp32.
  # bf16 is emulated on Turing (~12x slower), so amp=true means fp16 here.
  amp: true
  amp_dtype: float16        # Turing has no native bf16
  compile: true
  compile_mode: default     # max-autotune is tied; default avoids cudagraphs
  num_workers: 0            # Windows spawn can't pickle large in-RAM dataset
  checkpoint_dir: checkpoints_v5_local
  # lr_schedule defaults to cosine

# Transformer / controller sections omitted — this config is FSQ-only for now.
# Add later by copying from v5b.yaml with local batch/num_workers adjustments.
