# DeepDash V5b + calibrated dim_weights -- one-knob ablation over V5 baseline.
# Identical to v5b.yaml except:
#   - fsq_dim_weights: [1.02, 0.94, 0.83, 1.20] from fsq_sensitivity.py
#     (measured on 5000 val frames of checkpoints_v5_baseline/fsq_best.pt,
#      ~50 perturbations, 500 bootstrap samples, 3 seeds)
#   - transformer/BC/PPO checkpoint_dir isolated to preserve V5 baseline artifacts
# FSQ is re-used from the baseline (no retraining needed).
# Kernel stays gaussian, sigma stays 0.9 — only dim_weights are being swept.

# Shared model architecture
model:
  vocab_size: 625
  embed_dim: 512
  n_heads: 8
  n_layers: 8
  tokens_per_frame: 64
  context_frames: 4
  levels: [5, 5, 5, 5]
  dropout: 0.15
  adaln: true

# FSQ-VAE training (unchanged; re-uses v5_baseline FSQ)
fsq:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 2048
  lr: 0.001
  alpha_slow: 0.1
  alpha_uniform: 0.01
  k_shifts: 1
  seed: 42
  amp: true
  compile: true
  checkpoint_dir: checkpoints_v5_baseline

# Transformer world-model training
transformer:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 512
  lr: 0.004
  lr_min: 0.0005
  weight_decay: 0.01
  cpc_weight: 1.0
  token_noise: 0.05
  fsq_noise: 0.05
  label_smoothing: 0.1
  fsq_sigma: 0.9
  fsq_dim_weights: [1.02, 0.94, 0.83, 1.20]
  focal_gamma: 2.0
  death_oversample: 4
  steps_per_epoch: 500
  patience: 60
  seed: 42
  checkpoint_dir: checkpoints_v5b_dimweights

# Controller -- behavioral cloning pretraining
controller_bc:
  expert_episodes_dir: data/expert_episodes
  transformer_checkpoint: checkpoints_v5b_dimweights/transformer_best.pt
  epochs: 50
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  val_ratio: 0.1
  seed: 42
  checkpoint_dir: checkpoints_v5b_dimweights

# Controller -- PPO fine-tuning
controller_ppo:
  transformer_checkpoint: checkpoints_v5b_dimweights/transformer_best.pt
  pretrained: checkpoints_v5b_dimweights/controller_bc_best.pt
  amp_dtype: bfloat16
  n_iterations: 50000
  n_episodes: 512
  lr: 0.0001
  gamma: 0.995
  lam: 0.95
  clip_eps: 0.2
  ppo_epochs: 4
  minibatch_size: 512
  entropy_coeff: 0.01
  critic_coeff: 0.5
  max_grad_norm: 0.5
  max_dream_steps: 45
  death_threshold: 0.5
  mlp_hidden: 512
  n_eval_episodes: 512
  eval_interval: 10
  seed: 42
  checkpoint_dir: checkpoints_v5b_dimweights
