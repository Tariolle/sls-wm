# DeepDash V6 (768d + AdaLN + QK-norm) -- V4 scaled up
# Single variable change from V4: embed_dim 512->768, n_heads 8->12
# n_heads bumped to preserve head_dim=64 (important for QK-norm calibration).
# All other hyperparameters frozen at V4 values.
# Checkpoints isolated in checkpoints_v6/ to preserve V4 artifacts.

# Shared model architecture (consumed by transformer, controller_bc, controller_ppo)
model:
  vocab_size: 1000
  embed_dim: 768
  n_heads: 12
  n_layers: 8
  tokens_per_frame: 64
  context_frames: 4
  levels: [8, 5, 5, 5]
  dropout: 0.15
  adaln: true

# Transformer world-model training
transformer:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 512
  lr: 0.002
  lr_min: 0.0005
  weight_decay: 0.01
  cpc_weight: 1.0
  token_noise: 0.05
  fsq_noise: 0.05
  label_smoothing: 0.1
  fsq_sigma: 0.9
  fsq_dim_weights: [1.29, 0.85, 0.97, 0.89]
  focal_gamma: 2.0
  death_oversample: 4
  steps_per_epoch: 500
  seed: 42
  checkpoint_dir: checkpoints_v6

# Controller -- behavioral cloning pretraining
controller_bc:
  expert_episodes_dir: data/expert_episodes
  transformer_checkpoint: checkpoints_v6/transformer_best.pt
  epochs: 50
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  val_ratio: 0.1
  seed: 42
  checkpoint_dir: checkpoints_v6

# Controller -- PPO fine-tuning
controller_ppo:
  transformer_checkpoint: checkpoints_v6/transformer_best.pt
  pretrained: checkpoints_v6/controller_bc_best.pt
  amp_dtype: bfloat16
  n_iterations: 50000
  n_episodes: 512
  lr: 0.0001
  gamma: 0.995
  lam: 0.95
  clip_eps: 0.2
  ppo_epochs: 4
  minibatch_size: 512
  entropy_coeff: 0.01
  critic_coeff: 0.5
  max_grad_norm: 0.5
  max_dream_steps: 45
  death_threshold: 0.5
  mlp_hidden: 512
  n_eval_episodes: 512
  eval_interval: 10
  seed: 42
  checkpoint_dir: checkpoints_v6
